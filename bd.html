<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shlesha</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold: #c9a96e;
  --gold-light: #e8d5b0;
  --cream: #faf6f0;
  --dark: #1a1008;
}

body {
  background: #000;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  cursor: none;
}


}

/* ── BACKGROUND ── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;

  background-image: url("./photo.jpg");
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;

  filter: brightness(0.65) saturate(0.9);
}
@keyframes slowZoom {
  from { transform: scale(1); }
  to { transform: scale(1.08); }
}

/* Rich layered overlays */
.overlay-gradient {
  position: fixed;
  inset: 0;
  z-index: 1;
  background:
    radial-gradient(ellipse at 50% 100%, rgba(201,169,110,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.5) 0%, transparent 60%),
    linear-gradient(to bottom, rgba(10,6,2,0.3) 0%, transparent 30%, transparent 70%, rgba(10,6,2,0.6) 100%);
}

/* Grain */
.grain {
  position: fixed;
  inset: 0;
  z-index: 2;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ── CANVAS ── */
canvas {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

/* ── MAIN TEXT ── */
.stage {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 0;
  opacity: 0;
  animation: stageIn 1.5s ease 0.3s forwards;
}
@keyframes stageIn {
  from { opacity:0; transform: translateY(12px); }
  to { opacity:1; transform: translateY(0); }
}

.tag-line {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(13px, 1.5vw, 18px);
  color: var(--gold);
  letter-spacing: 8px;
  margin-bottom: 16px;
  opacity: 0;
  animation: fadeUp 1s ease 0.6s forwards;
}

.title-happy {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(40px, 6vw, 80px);
  color: rgba(255,255,255,0.85);
  letter-spacing: 10px;
  line-height: 1;
  opacity: 0;
  animation: fadeUp 1s ease 0.9s forwards;
  text-shadow: 0 0 60px rgba(201,169,110,0.3);
}

.title-birthday {
  font-family: 'Playfair Display', serif;
  font-weight: 400;
  font-size: clamp(52px, 9vw, 120px);
  color: #fff;
  letter-spacing: 6px;
  line-height: 1;
  opacity: 0;
  animation: fadeUp 1s ease 1.1s forwards;
  text-shadow: 0 4px 40px rgba(0,0,0,0.5);
}

.title-name {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 700;
  font-size: clamp(60px, 11vw, 150px);
  color: var(--gold);
  line-height: 1;
  opacity: 0;
  animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 1.4s forwards;
  text-shadow: 0 0 80px rgba(201,169,110,0.4), 0 4px 30px rgba(0,0,0,0.5);
  position: relative;
}

/* Decorative rule under name */
.title-name::after {
  content: '✦';
  display: block;
  font-size: 18px;
  color: var(--gold);
  opacity: 0.6;
  margin-top: 12px;
  letter-spacing: 20px;
  font-style: normal;
  font-weight: 400;
  text-shadow: none;
}

.subtitle {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(14px, 1.8vw, 20px);
  color: rgba(232,213,176,0.7);
  letter-spacing: 3px;
  margin-top: 20px;
  opacity: 0;
  animation: fadeUp 1s ease 1.8s forwards;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to { opacity:1; transform:translateY(0); }
}

/* ── CORNER ORNAMENTS ── */
.corner {
  position: fixed;
  width: 50px;
  height: 50px;
  z-index: 10;
  opacity: 0;
  animation: fadeUp 1s ease 2s forwards;
}
.corner-tl { top:24px; left:24px; border-top:1px solid var(--gold); border-left:1px solid var(--gold); }
.corner-tr { top:24px; right:24px; border-top:1px solid var(--gold); border-right:1px solid var(--gold); }
.corner-bl { bottom:24px; left:24px; border-bottom:1px solid var(--gold); border-left:1px solid var(--gold); }
.corner-br { bottom:24px; right:24px; border-bottom:1px solid var(--gold); border-right:1px solid var(--gold); }

/* ── CUSTOM CURSOR ── */
#cursor {
  position: fixed;
  width: 6px;
  height: 6px;
  background: var(--gold);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.1s ease;
  box-shadow: 0 0 10px rgba(201,169,110,0.8);
}
#cursor-ring {
  position: fixed;
  width: 28px;
  height: 28px;
  border: 1px solid rgba(201,169,110,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: left 0.12s ease, top 0.12s ease;
}


</style>
</head>
<body>


  <div class="curtain-line"></div>
</div>

<!-- Cursor -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Background -->
<div class="overlay-gradient"></div>
<div class="grain"></div>
<div class="bg"></div>

<!-- Particles canvas -->
<canvas id="c"></canvas>

<!-- Corner ornaments -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Main text -->
<div class="stage">
  <div class="tag-line">with love, from your family</div>
  <div class="title-happy">Happy</div>
  <div class="title-birthday">Birthday</div>
  <div class="title-name">Shlesha</div>
  <div class="subtitle">may this day be as wonderful as you are</div>
</div>



<script>
// ── CURSOR ──
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top = e.clientY + 'px';
  ring.style.left = e.clientX + 'px';
  ring.style.top = e.clientY + 'px';
});

// ── CANVAS PARTICLES ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

// Balloons
const balloonColors = ['#f9c8c8','#fde5c0','#c8e8d0','#c8d8f8','#ecc8f8','#fef0c0'];
const balloons = Array.from({length:16}, (_,i) => ({
  x: Math.random()*innerWidth,
  y: innerHeight + 80 + Math.random()*400,
  r: 20 + Math.random()*18,
  color: balloonColors[i % balloonColors.length],
  speed: 0.55 + Math.random()*0.7,
  sway: Math.random()*Math.PI*2,
  swaySpeed: 0.007 + Math.random()*0.005,
}));

// Embers / golden sparks
const sparks = Array.from({length:80}, () => ({
  x: Math.random()*innerWidth,
  y: Math.random()*innerHeight,
  size: 1 + Math.random()*2.5,
  speedY: -(0.2 + Math.random()*0.5),
  speedX: (Math.random()-0.5)*0.3,
  opacity: Math.random(),
  life: Math.random(),
  fadeSpeed: 0.003 + Math.random()*0.005,
}));

// Flakes (gold snowflakes)
const flakes = Array.from({length:45}, () => ({
  x: Math.random()*innerWidth,
  y: Math.random()*innerHeight - innerHeight,
  size: 2.5 + Math.random()*4,
  speed: 0.4 + Math.random()*0.9,
  drift: (Math.random()-0.5)*0.3,
  opacity: 0.3 + Math.random()*0.5,
  rot: Math.random()*Math.PI*2,
}));

function drawBalloon(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.globalAlpha = 0.82;
  // Body
  ctx.beginPath();
  ctx.ellipse(0,0,b.r,b.r*1.25,0,0,Math.PI*2);
  ctx.fillStyle = b.color;
  ctx.fill();
  // Shine
  ctx.beginPath();
  ctx.ellipse(-b.r*0.28,-b.r*0.3,b.r*0.16,b.r*0.22,-0.3,0,Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
  // Knot
  ctx.beginPath();
  ctx.arc(0,b.r*1.25,3,0,Math.PI*2);
  ctx.fillStyle = b.color;
  ctx.fill();
  // String (wavy)
  ctx.beginPath();
  ctx.moveTo(0,b.r*1.25+3);
  for(let i=0;i<50;i++) ctx.lineTo(Math.sin(i*0.35)*5, b.r*1.3+i*2.2);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 0.7;
  ctx.stroke();
  ctx.restore();
}

function drawFlake(f) {
  ctx.save();
  ctx.translate(f.x,f.y);
  ctx.rotate(f.rot);
  ctx.globalAlpha = f.opacity;
  for(let i=0;i<6;i++) {
    ctx.save(); ctx.rotate(i*Math.PI/3);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-f.size);
    ctx.strokeStyle = '#e8d5b0'; ctx.lineWidth = 0.9; ctx.stroke();
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(0,0,f.size*0.22,0,Math.PI*2);
  ctx.fillStyle = '#e8d5b0'; ctx.fill();
  ctx.restore();
}

function drawSpark(s) {
  ctx.save();
  ctx.globalAlpha = s.opacity * s.life;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
  const g = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.size*2);
  g.addColorStop(0,'rgba(255,220,130,0.9)');
  g.addColorStop(1,'rgba(201,169,110,0)');
  ctx.fillStyle = g;
  ctx.fill();
  ctx.restore();
}

// Burst of sparks on click
let burstParticles = [];
document.addEventListener('click', e => {
  for(let i=0;i<20;i++) {
    const angle = (Math.PI*2/20)*i;
    burstParticles.push({
      x: e.clientX, y: e.clientY,
      vx: Math.cos(angle)*(2+Math.random()*3),
      vy: Math.sin(angle)*(2+Math.random()*3),
      life: 1, size: 2+Math.random()*3,
    });
  }
});

function animate() {
  ctx.clearRect(0,0,W,H);

  balloons.forEach(b => {
    b.sway += b.swaySpeed;
    b.x += Math.sin(b.sway)*0.6;
    b.y -= b.speed;
    if(b.y < -130) { b.y = H+100; b.x = Math.random()*W; }
    drawBalloon(b);
  });

  flakes.forEach(f => {
    f.x += f.drift; f.y += f.speed; f.rot += 0.008;
    if(f.y > H+10) { f.y=-10; f.x=Math.random()*W; }
    drawFlake(f);
  });

  sparks.forEach(s => {
    s.x += s.speedX; s.y += s.speedY;
    s.life -= s.fadeSpeed;
    if(s.life <= 0) {
      s.x = Math.random()*W; s.y = H+5;
      s.life = 0.6+Math.random()*0.4;
      s.speedY = -(0.2+Math.random()*0.5);
    }
    drawSpark(s);
  });

  burstParticles.forEach((p,i) => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.03;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle = '#c9a96e'; ctx.fill();
    ctx.restore();
  });
  burstParticles = burstParticles.filter(p => p.life > 0);

  requestAnimationFrame(animate);
}
animate();

// ── MUSIC ──
let audioCtx = null;
let playing = false;

const melody = [
  [261.63,0.3],[261.63,0.1],[293.66,0.4],[261.63,0.4],[349.23,0.4],[329.63,0.8],
  [261.63,0.3],[261.63,0.1],[293.66,0.4],[261.63,0.4],[392.00,0.4],[349.23,0.8],
  [261.63,0.3],[261.63,0.1],[523.25,0.4],[440.00,0.4],[349.23,0.4],[329.63,0.4],[293.66,0.8],
  [466.16,0.3],[466.16,0.1],[440.00,0.4],[349.23,0.4],[392.00,0.4],[349.23,0.8],
];
const totalDur = melody.reduce((s,[,d]) => s+d, 0);

function playLoop() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.18, audioCtx.currentTime);
  master.connect(audioCtx.destination);

  let t = audioCtx.currentTime + 0.1;
  melody.forEach(([freq, dur]) => {
    // Main tone
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(master);
    o.type = 'sine';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.6, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.start(t); o.stop(t+dur+0.05);

    // Harmony (one octave up, softer)
    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    o2.connect(g2); g2.connect(master);
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(freq*2, t);
    g2.gain.setValueAtTime(0.12, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o2.start(t); o2.stop(t+dur+0.05);

    t += dur;
  });
  setTimeout(playLoop, (totalDur + 1) * 1000);
}

function startMusic() {
  if(playing) return;
  playing = true;
  playLoop();
}

document.addEventListener('click', startMusic, {once:true});
window.addEventListener('load', () => { try { startMusic(); } catch(e) {} });
</script>
</body>
</html>
